version: "3.9"

services:
  llm-calculator:
    build: .
    container_name: llm-calculator
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/metrics')"]
      interval: 30s
      timeout: 5s
      retries: 3
